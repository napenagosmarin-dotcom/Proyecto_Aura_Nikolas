<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <main class="main-content main-content--auth" id="mainContent">
    <section class="auth-section">
      <div class="auth-form-panel auth-form-panel--solo">
        <form id="registerForm" class="form form-auth login-premium">
          <div class="login-header">
            <h2>Crear Cuenta</h2>
            <p>Completa tus datos para unirte a nosotros.</p>
          </div>

          <h4 class="form-section-title">Información Personal</h4>
          <div class="form-grid premium-grid">
            <div class="form-group premium-group">
              <label for="NombreUsuario">Nombre(s)</label>
              <div class="input-icon-wrapper">
                <i data-lucide="user" class="input-icon"></i>
                <input type="text" id="NombreUsuario" placeholder="Ej. Juan" required>
              </div>
            </div>
            <div class="form-group premium-group">
              <label for="Apellido">Apellido(s)</label>
              <div class="input-icon-wrapper">
                <i data-lucide="user" class="input-icon"></i>
                <input type="text" id="Apellido" placeholder="Ej. Pérez" required>
              </div>
            </div>
            <div class="form-group premium-group">
              <label for="TipoDocumento">Tipo de Doc.</label>
              <div class="input-icon-wrapper">
                <i data-lucide="file-text" class="input-icon"></i>
                <select id="TipoDocumento" required class="premium-select">
                  <option value="" disabled selected>Seleccione...</option>
                  <option value="DNI">DNI</option>
                  <option value="Pasaporte">Pasaporte</option>
                  <option value="Cédula">Cédula</option>
                  <option value="Otro">Otro</option>
                </select>
              </div>
            </div>
            <div class="form-group premium-group">
              <label for="NumeroDocumento">Nº de Documento</label>
              <div class="input-icon-wrapper">
                <i data-lucide="hash" class="input-icon"></i>
                <input type="text" id="NumeroDocumento" placeholder="123456789" required>
              </div>
            </div>
          </div>

          <h4 class="form-section-title">Datos de Contacto</h4>
          <div class="form-grid premium-grid">
            <div class="form-group premium-group">
              <label for="Pais">País</label>
              <div class="input-icon-wrapper">
                <i data-lucide="map-pin" class="input-icon"></i>
                <input type="text" id="Pais" placeholder="Ej. Colombia" required>
              </div>
            </div>
            <div class="form-group premium-group">
              <label for="Telefono">Teléfono</label>
              <div class="input-icon-wrapper">
                <i data-lucide="phone" class="input-icon"></i>
                <input type="text" id="Telefono" placeholder="+57 300 000 0000" required>
              </div>
            </div>
            <div class="form-group premium-group" style="grid-column: 1 / -1;">
              <label for="Direccion">Dirección Completa</label>
              <div class="input-icon-wrapper">
                <i data-lucide="map" class="input-icon"></i>
                <input type="text" id="Direccion" placeholder="Calle 123 #45-67, Ciudad" required>
              </div>
            </div>
          </div>

          <h4 class="form-section-title">Credenciales de Acceso</h4>
          <div class="form-group premium-group">
            <label for="Email">Correo Electrónico</label>
            <div class="input-icon-wrapper">
              <i data-lucide="mail" class="input-icon"></i>
              <input type="email" id="Email" placeholder="tu@correo.com" required>
            </div>
          </div>
          <div class="form-grid premium-grid">
            <div class="form-group premium-group">
              <label for="Contrasena">Contraseña</label>
              <div class="input-icon-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <input type="password" id="Contrasena" placeholder="••••••••" required>
              </div>
            </div>
            <div class="form-group premium-group">
              <label for="ConfirmarContrasena">Confirmar Contraseña</label>
              <div class="input-icon-wrapper">
                <i data-lucide="shield" class="input-icon"></i>
                <input type="password" id="ConfirmarContrasena" placeholder="••••••••" required>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primario btn-login">
            Completar Registro <i data-lucide="arrow-right" class="btn-icon"></i>
          </button>

          <p id="errorMessage" class="error-msg" style="text-align: center; margin-top: 10px; display: none;"></p>

          <div class="login-divider">
            <span>o</span>
          </div>

          <p class="login-register-text">
            ¿Ya tienes una cuenta? <a href="/src/pages/login.html">Inicia sesión aquí</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/register.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
