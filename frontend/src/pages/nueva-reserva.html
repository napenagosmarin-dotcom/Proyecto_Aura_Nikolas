<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva Reserva - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/nueva-reserva.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (!localStorage.getItem('user')) {
      window.location.href = '/src/pages/login.html';
    }
  </script>
</head>
<body class="main-content--premium">

  <div id="header-container"></div>
  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>
  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">
    <div class="nr-wrapper">

      <!-- Encabezado de página -->
      <div class="nr-header">
        <div>
          <h1 class="nr-titulo">Nueva Reserva</h1>
          <p class="nr-subtitulo">Crea una nueva reserva para tu próxima experiencia</p>
        </div>
      </div>

      <!-- Layout principal -->
      <div class="nr-layout">

        <!-- COLUMNA IZQUIERDA: formulario -->
        <form id="reservationForm" class="nr-form">

          <!-- Bloque 1: Selección -->
          <div class="nr-card">
            <div class="nr-card__titulo">Detalles de la Reserva</div>
            <div class="nr-grid-3">
              <div class="nr-field">
                <label for="IDHabitacion">Habitación</label>
                <select id="IDHabitacion" required>
                  <option value="">Seleccione una habitación</option>
                </select>
                <div id="detalleHabitacion" class="nr-detalle" style="display:none;"></div>
              </div>
              <div class="nr-field">
                <label for="IDPaquete">Paquete</label>
                <select id="IDPaquete" required>
                  <option value="">Seleccione un paquete</option>
                </select>
                <div id="detallePaquete" class="nr-detalle" style="display:none;"></div>
              </div>
              <div class="nr-field">
                <label for="MetodoPago">Método de Pago</label>
                <select id="MetodoPago" required>
                  <option value="">Seleccione un método</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Bloque 2: Servicios + Fechas lado a lado -->
          <div class="nr-grid-2">

            <div class="nr-card">
              <div class="nr-card__titulo">Servicios Adicionales</div>
              <div id="serviciosContainer"></div>
            </div>

            <div class="nr-card">
              <div class="nr-card__titulo">Fechas</div>
              <div class="nr-field">
                <label for="FechaInicio">Fecha de Inicio</label>
                <input type="date" id="FechaInicio" required>
              </div>
              <div class="nr-field nr-field--mt">
                <label for="FechaFinalizacion">Fecha de Finalización</label>
                <input type="date" id="FechaFinalizacion" required>
              </div>
              <p id="dateAvailabilityMessage" class="nr-aviso"></p>
            </div>

          </div>

          <!-- Acciones -->
          <div class="nr-actions">
            <button type="submit" class="btn btn-primario">Confirmar Reserva</button>
            <a href="/src/pages/reservas.html" class="btn nr-btn-cancelar">Cancelar</a>
          </div>

        </form>

        <!-- COLUMNA DERECHA: resumen de pago -->
        <div class="nr-resumen">
          <div class="nr-resumen__titulo">Resumen de Pago</div>
          <div class="nr-resumen__fila">
            <span>Subtotal</span>
            <span id="subtotal">$0</span>
          </div>
          <div class="nr-resumen__fila">
            <span>IVA (19%)</span>
            <span id="iva">$0</span>
          </div>
          <div class="nr-resumen__total">
            <span>Total</span>
            <span id="total">$0</span>
          </div>
        </div>

      </div>
    </div>
    <div id="footer-container"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/nueva-reserva.js"></script>
</body>
</html>
